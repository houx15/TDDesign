<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>taste init</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0; background: #0F0F10; color: #FAFAFA; }
  main { max-width: 960px; margin: 0 auto; padding: 48px 24px; }
  h1 { font-size: 28px; margin: 0 0 8px; }
  p.lead { opacity: 0.7; margin: 0 0 32px; }
  .progress { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 32px; }
  .progress-fill { height: 100%; background: #5B6EE1; border-radius: 2px; transition: width 200ms; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 16px; }
  .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color 150ms; }
  .card:hover { border-color: #5B6EE1; }
  .card.selected { border-color: #5B6EE1; background: rgba(91,110,225,0.12); }
  .card-preview { height: 320px; border-radius: 6px; margin-bottom: 12px; overflow: hidden; }
  .card-label { font-weight: 600; }
  .card-tags { opacity: 0.6; font-size: 12px; margin-top: 4px; }
  .group-heading { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.5; margin: 24px 0 8px; }
  button.primary { background: #5B6EE1; color: white; border: 0; padding: 12px 20px; border-radius: 6px; font: inherit; cursor: pointer; }
  button.ghost { background: transparent; color: inherit; border: 1px solid rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 6px; font: inherit; cursor: pointer; margin-right: 8px; }
  .notice { background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.3); padding: 12px; border-radius: 6px; margin: 16px 0; font-size: 14px; }
  .review-row { display: grid; grid-template-columns: 160px 1fr auto; gap: 16px; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  a.edit { color: #5B6EE1; text-decoration: none; font-size: 13px; }
  .swatch-row { display: flex; gap: 8px; }
  .swatch { width: 40px; height: 40px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>
<main id="app">loading…</main>
<script>
(function () {
  var DIMENSIONS = [{"dimension":"overall_style","question":"Pick a mood."},{"dimension":"color_direction","question":"Pick a palette."},{"dimension":"typography","question":"Pick a typographic voice."},{"dimension":"component_style","question":"Pick a component style."},{"dimension":"layout_spacing","question":"Pick a spacing feel."},{"dimension":"detail_elements","question":"Pick detail treatment."},{"dimension":"motion","question":"Pick a motion feel."}];
  var MOODS = ["minimal","editorial","playful","brutalist","warm-technical","vivid-modern"];
  var OVERALL_STYLE_MOCKUPS = {"minimal-precise":"<div style=\"width:100%;height:100%;background:{{background}};color:{{text}};display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 32px;box-sizing:border-box;font-family:{{fontFamily}}\"><h1 style=\"font-size:28px;font-weight:400;letter-spacing:-0.01em;margin:0;text-align:center\">Write less. Ship more.</h1><div style=\"width:40px;height:1px;background:rgba(255,255,255,0.15);margin:24px 0\"></div><p style=\"font-size:14px;opacity:0.6;margin:0;text-align:center\">A distraction-free editor for deep work.</p><button style=\"margin-top:32px;background:{{accent}};color:#fff;border:{{border}};border-radius:{{radius}}px;padding:10px 20px;font-size:13px;font-family:inherit;cursor:pointer;box-shadow:{{shadow}};transition:{{buttonTransition}}\">Get started {{iconRow}}</button></div>","editorial-serif":"<div style=\"width:100%;height:100%;background:{{background}};color:{{text}};padding:48px 32px 32px 25%;box-sizing:border-box;font-family:{{fontFamily}}\"><div style=\"font-family:Inter,system-ui,sans-serif;font-size:11px;letter-spacing:0.18em;color:{{accent}};margin-bottom:24px;text-transform:uppercase\">ISSUE 14 &middot; APRIL</div><h1 style=\"font-family:{{fontFamily}};font-size:32px;font-style:italic;font-weight:400;line-height:1.15;margin:0 0 20px\">The quiet renaissance of slow software.</h1><p style=\"font-family:{{fontFamily}};font-size:14px;font-style:italic;opacity:0.6;line-height:1.5;margin:0\">Craft, rhythm, and the things we lose when everything is optimized for speed.</p></div>","playful-rounded":"<div style=\"width:100%;height:100%;background:{{background}};color:{{text}};display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;box-sizing:border-box;position:relative;font-family:{{fontFamily}}\"><h1 style=\"font-size:26px;font-weight:700;margin:0 0 12px;transform:rotate(-1.5deg);text-align:center\">Make something people will hug.</h1><p style=\"font-size:13px;opacity:0.7;margin:0 0 24px;text-align:center\">The fastest way to ship a product users actually love.</p><div style=\"display:flex;gap:8px\"><button style=\"background:{{accent}};color:#fff;border:{{border}};border-radius:{{radius}}px;padding:10px 18px;font-size:13px;font-family:inherit;cursor:pointer;box-shadow:{{shadow}};transition:{{buttonTransition}}\">Try it free {{iconRow}}</button><button style=\"background:transparent;color:{{accent}};border:1px solid {{accent}};border-radius:{{radius}}px;padding:10px 18px;font-size:13px;font-family:inherit;cursor:pointer\">See examples</button></div><div style=\"position:absolute;top:16px;right:16px;width:56px;height:56px;background:#F472B6;color:#fff;font-size:12px;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center;transform:rotate(8deg)\">new!</div></div>","brutalist-raw":"<div style=\"width:100%;height:100%;background:{{background}};color:{{text}};position:relative;box-sizing:border-box;border-right:1px solid {{text}};border-bottom:1px solid {{text}};overflow:hidden;font-family:{{fontFamily}}\"><h1 style=\"font-family:{{fontFamily}};font-size:44px;text-transform:uppercase;line-height:0.95;letter-spacing:-0.02em;margin:24px;margin-left:-8px\">BUILT. NOT RENDERED.</h1><button style=\"position:absolute;left:24px;bottom:24px;background:{{text}};color:#fff;border:{{border}};border-radius:{{radius}}px;padding:11px 22px;font-size:13px;text-transform:uppercase;letter-spacing:0.1em;font-family:Arial,sans-serif;cursor:pointer;box-shadow:{{shadow}};transition:{{buttonTransition}}\">ENTER {{iconRow}}</button><div style=\"position:absolute;top:0;right:0;width:1px;height:100%;background:{{text}}\"></div><div style=\"position:absolute;left:0;bottom:0;width:100%;height:1px;background:{{text}}\"></div></div>","warm-technical":"<div style=\"width:100%;height:100%;background:{{background}};color:{{text}};display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:32px;box-sizing:border-box;font-family:{{fontFamily}}\"><div style=\"display:flex;flex-direction:column;justify-content:center\"><h1 style=\"font-size:22px;font-weight:600;line-height:1.2;margin:0 0 12px\">Developer tools, built with warmth.</h1><p style=\"font-size:13px;opacity:0.7;line-height:1.5;margin:0 0 20px\">APIs that feel hand-held. SDKs that read like prose.</p><button style=\"background:{{accent}};color:#fff;border:{{border}};border-radius:{{radius}}px;padding:10px 18px;font-size:13px;font-family:inherit;cursor:pointer;width:max-content;box-shadow:{{shadow}};transition:{{buttonTransition}}\">Read the docs {{iconRow}}</button></div><div style=\"background:#1A1A1A;color:#F7F3EC;border-radius:{{radius}}px;padding:14px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;line-height:1.6;white-space:pre;align-self:center\"><span style=\"color:rgba(247,243,236,0.4)\">// one tidy export</span>\n<span style=\"color:{{accent}}\">export async function</span> warm(\n  request: Request,\n) {\n  <span style=\"color:{{accent}}\">return</span> <span style=\"color:#84CC16\">\"hello\"</span>;\n}</div></div>","vivid-modern":"<div style=\"width:100%;height:100%;background:{{background}};color:{{text}};display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;box-sizing:border-box;position:relative;font-family:{{fontFamily}}\"><h1 style=\"font-size:36px;font-weight:700;line-height:1.0;margin:0 0 14px;background:linear-gradient(90deg,{{accent}},#F472B6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center\">The future, early.</h1><p style=\"font-size:13px;opacity:0.8;margin:0 0 28px;text-align:center\">Compute, rendered at the speed of thought.</p><button style=\"background:rgba(255,255,255,0.12);border:{{border}};backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:{{radius}}px;padding:11px 22px;font-size:13px;color:#fff;font-weight:500;font-family:inherit;cursor:pointer;box-shadow:{{shadow}};transition:{{buttonTransition}}\">Join the waitlist {{iconRow}}</button><div style=\"position:absolute;left:10%;right:10%;bottom:16px;height:2px;background:linear-gradient(90deg,transparent,{{accent}},transparent)\"></div></div>"};
  var MOOD_DEFAULTS = {"minimal-precise":{"background":"#0F0F10","text":"#FAFAFA","accent":"#5B6EE1","fontFamily":"Inter, system-ui, sans-serif","radius":6,"shadow":"0 1px 2px rgba(0,0,0,0.06)","border":"none","paddingMin":48,"paddingMax":96,"iconStyle":"line","motionDurationMs":150,"motionEasing":"ease-out","mood":"minimal-precise"},"editorial-serif":{"background":"#FDFCF8","text":"#1A1A1A","accent":"#0057FF","fontFamily":"Georgia, 'Times New Roman', serif","radius":4,"shadow":"none","border":"none","paddingMin":64,"paddingMax":128,"iconStyle":"duotone","motionDurationMs":400,"motionEasing":"ease-in-out","mood":"editorial-serif"},"playful-rounded":{"background":"#FDE8F4","text":"#1A1033","accent":"#A855F7","fontFamily":"Inter, system-ui, sans-serif","radius":16,"shadow":"0 8px 24px rgba(168,85,247,0.2)","border":"none","paddingMin":32,"paddingMax":64,"iconStyle":"emoji","motionDurationMs":220,"motionEasing":"cubic-bezier(0.34,1.56,0.64,1)","mood":"playful-rounded"},"brutalist-raw":{"background":"#D4D4D4","text":"#0A0A0A","accent":"#DC2626","fontFamily":"'Arial Black', Arial, sans-serif","radius":0,"shadow":"none","border":"4px solid #0A0A0A","paddingMin":16,"paddingMax":32,"iconStyle":"filled","motionDurationMs":0,"motionEasing":"linear","mood":"brutalist-raw"},"warm-technical":{"background":"#F7F3EC","text":"#1A1A1A","accent":"#C2410C","fontFamily":"Inter, system-ui, sans-serif","radius":6,"shadow":"0 1px 2px rgba(0,0,0,0.06)","border":"none","paddingMin":32,"paddingMax":64,"iconStyle":"line","motionDurationMs":150,"motionEasing":"ease-out","mood":"warm-technical"},"vivid-modern":{"background":"#1B1033","text":"#F3E8FF","accent":"#A855F7","fontFamily":"Inter, system-ui, sans-serif","radius":12,"shadow":"0 8px 32px rgba(168,85,247,0.3)","border":"1px solid rgba(255,255,255,0.3)","paddingMin":40,"paddingMax":80,"iconStyle":"duotone","motionDurationMs":220,"motionEasing":"cubic-bezier(0.34,1.56,0.64,1)","mood":"vivid-modern"}};
  var DIM_ORDER = ["color_direction","typography","component_style","layout_spacing","detail_elements","motion"];
  var state = { choices: null, step: 0, mood: null, picks: {}, currentStyle: null };

  function interpolate(tpl, slots) {
    return tpl.replace(/\{\{(\w+)\}\}/g, function (_, k) {
      return slots[k] !== undefined ? String(slots[k]) : '';
    });
  }
  function renderIconRow(iconStyle) {
    if (iconStyle === 'line') return '→';
    if (iconStyle === 'filled') return '▶';
    if (iconStyle === 'emoji') return '🚀';
    return '◆';
  }
  function deriveSlots(b) {
    var s = {};
    for (var k in b) s[k] = b[k];
    s.buttonTransition = 'transform ' + b.motionDurationMs + 'ms ' + b.motionEasing;
    s.iconRow = renderIconRow(b.iconStyle);
    return s;
  }
  function findOption(dimName, id) {
    for (var i = 0; i < state.choices.length; i++) {
      var d = state.choices[i];
      if (d.dimension !== dimName) continue;
      for (var j = 0; j < d.options.length; j++) {
        if (d.options[j].id === id) return d.options[j];
      }
    }
    return null;
  }
  function recomputeStyle() {
    if (!state.mood) { state.currentStyle = null; return; }
    var bundle = {};
    var defaults = MOOD_DEFAULTS[state.mood];
    for (var k in defaults) bundle[k] = defaults[k];
    for (var i = 0; i < DIM_ORDER.length; i++) {
      var dim = DIM_ORDER[i];
      var pickId = state.picks[dim];
      if (!pickId) continue;
      var option = findOption(dim, pickId);
      if (option && option.tokens) {
        for (var k2 in option.tokens) bundle[k2] = option.tokens[k2];
      }
    }
    state.currentStyle = bundle;
  }
  var app = document.getElementById('app');

  fetch('/choices.json').then(function (r) { return r.json(); }).then(function (data) {
    state.choices = data.dimensions;
    render();
  });

  function render() {
    if (!state.choices) { app.textContent = 'loading…'; return; }
    var totalSteps = 1 + state.choices.length + 1;
    if (state.step === 0) return renderWelcome(totalSteps);
    if (state.step <= state.choices.length) return renderDimension(state.step - 1, totalSteps);
    return renderReview(totalSteps);
  }

  function progressBar(step, total) {
    var pct = Math.round((step / (total - 1)) * 100);
    return '<div class="progress"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
  }

  function renderWelcome(total) {
    app.innerHTML =
      progressBar(0, total) +
      '<h1>taste init</h1>' +
      '<p class="lead">Pick one option per dimension. We write preference_vector.json when you are done.</p>' +
      '<button class="primary" id="start">Start</button>';
    document.getElementById('start').onclick = function () { state.step = 1; render(); };
  }

  function renderDimension(idx, total) {
    var dim = state.choices[idx];
    var selected = state.picks[dim.dimension];
    var recommended = [];
    var others = [];
    for (var i = 0; i < dim.options.length; i++) {
      var opt = dim.options[i];
      (state.mood && opt.moodTags.indexOf(state.mood) >= 0 ? recommended : others).push(opt);
    }
    var html =
      progressBar(idx + 1, total) +
      '<h1>' + dim.question + '</h1>' +
      '<p class="lead">Step ' + (idx + 1) + ' of ' + state.choices.length + '</p>';
    if (state.mood && recommended.length) {
      html += '<div class="group-heading">Recommended for ' + state.mood + '</div>';
      html += '<div class="grid">' + recommended.map(cardHtml).join('') + '</div>';
      html += '<div class="group-heading">Other options</div>';
      html += '<div class="grid">' + others.map(cardHtml).join('') + '</div>';
    } else {
      html += '<div class="grid">' + dim.options.map(cardHtml).join('') + '</div>';
    }
    html += '<div style="margin-top:32px"><button class="ghost" id="back">Back</button><button class="primary" id="next">Next</button></div>';
    app.innerHTML = html;
    bindCards(dim);
    document.getElementById('back').onclick = function () { if (state.step > 0) { state.step--; render(); } };
    document.getElementById('next').onclick = function () {
      if (!state.picks[dim.dimension]) return;
      if (dim.dimension === 'overall_style') {
        state.mood = state.picks[dim.dimension];
      }
      recomputeStyle();
      state.step++;
      render();
    };
    function cardHtml(opt) {
      var sel = state.picks[dim.dimension] === opt.id ? ' selected' : '';
      return '<div class="card' + sel + '" data-id="' + opt.id + '">' +
        '<div class="card-preview">' + previewHtml(dim.dimension, opt) + '</div>' +
        '<div class="card-label">' + opt.label + '</div>' +
        '<div class="card-tags">' + opt.moodTags.join(', ') + '</div>' +
        '</div>';
    }
    function bindCards(d) {
      var cards = app.querySelectorAll('.card');
      cards.forEach(function (c) {
        c.onclick = function () {
          state.picks[d.dimension] = c.getAttribute('data-id');
          if (d.dimension === 'overall_style') state.mood = c.getAttribute('data-id');
          recomputeStyle();
          render();
        };
      });
    }
  }

  function previewHtml(dimension, opt) {
    if (dimension === 'overall_style') {
      var bundle = MOOD_DEFAULTS[opt.id];
      return interpolate(OVERALL_STYLE_MOCKUPS[opt.id], deriveSlots(bundle));
    }
    if (!state.mood) {
      return '<div style="padding:20px;font-size:13px;opacity:0.7">' + opt.label + '</div>';
    }
    var base = {};
    var defaults = MOOD_DEFAULTS[state.mood];
    for (var k in defaults) base[k] = defaults[k];
    if (state.currentStyle) for (var k2 in state.currentStyle) base[k2] = state.currentStyle[k2];
    if (opt.tokens) for (var k3 in opt.tokens) base[k3] = opt.tokens[k3];
    var tpl = OVERALL_STYLE_MOCKUPS[state.mood];
    return interpolate(tpl, deriveSlots(base));
  }

  function renderReview(total) {
    var rows = state.choices.map(function (d) {
      var pickId = state.picks[d.dimension];
      var opt = d.options.find(function (o) { return o.id === pickId; });
      var drift = state.mood && opt.moodTags.indexOf(state.mood) < 0;
      return '<div class="review-row">' +
        '<div>' + d.dimension + '</div>' +
        '<div>' + opt.label + (drift ? ' <span style="opacity:0.6">(off-mood)</span>' : '') + '</div>' +
        '<a class="edit" href="#" data-step="' + (state.choices.indexOf(d) + 1) + '">Edit</a>' +
        '</div>';
    }).join('');
    app.innerHTML =
      progressBar(total - 1, total) +
      '<h1>Review</h1>' +
      '<p class="lead">Confirm your 7 picks, then write the file.</p>' +
      finalMockup() +
      rows +
      '<div style="margin-top:24px"><button class="ghost" id="back">Back</button><button class="primary" id="submit">Write preference_vector.json</button></div>' +
      '<div id="msg"></div>';
    var edits = app.querySelectorAll('a.edit');
    edits.forEach(function (a) {
      a.onclick = function (e) { e.preventDefault(); state.step = parseInt(a.getAttribute('data-step'), 10); render(); };
    });
    document.getElementById('back').onclick = function () { state.step--; render(); };
    document.getElementById('submit').onclick = submit;
  }

  function finalMockup() {
    if (!state.mood || !state.currentStyle) return '';
    var html = interpolate(OVERALL_STYLE_MOCKUPS[state.mood], deriveSlots(state.currentStyle));
    return '<div style="margin-bottom:24px;max-width:480px;height:320px;border-radius:8px;overflow:hidden">' + html + '</div>';
  }

  function submit() {
    fetch('/submit', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ mood: state.mood, picks: state.picks })
    }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok) { document.getElementById('msg').innerHTML = '<div class="notice">' + (res.j.error || 'error') + '</div>'; return; }
        app.innerHTML = '<h1>Done.</h1><p class="lead">Wrote ' + res.j.path + '. You can close this tab.</p>';
        fetch('/shutdown', { method: 'POST' });
      });
  }
})();
</script>
</body>
</html>
